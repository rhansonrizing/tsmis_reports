<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TSMIS Reports</title>
  <script src="config.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2.5rem 1rem;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1), 0 4px 16px rgba(0,0,0,0.06);
      padding: 2rem;
      width: 100%;
      max-width: 1032px;
      position: relative;
    }

    .caltrans-logo {
      position: absolute;
      top: 1.25rem;
      left: 0;
      height: 52px;
      width: auto;
    }

    .page-header {
      display: flex;
      flex-direction: row;
      justify-content: flex-end;
      align-items: center;
      margin-bottom: 0;
    }
    #controlsGrid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      align-items: start;
      column-gap: 1.5rem;
      row-gap: 0.35rem;
      margin-top: 1rem;
    }
    #districtRow    { grid-column: 1; grid-row: 1; }
    #districtCountyRow { grid-column: 1; grid-row: 2; }
    #districtRouteRow  { grid-column: 1; grid-row: 3; }
    #versionCtrl    { grid-column: 3; grid-row: 1; }
    #refDateWrap    { grid-column: 3; grid-row: 2; }
    #onOffSection   { grid-column: 3; grid-row: 3; }
    .ctrl-row {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .ctrl-row label {
      margin-bottom: 0;
      font-size: 0.8rem;
      font-weight: 500;
      color: #6b7280;
      white-space: nowrap;
      display: block;
    }
    #generateRow {
      grid-column: 2;
      grid-row: 3;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding-top: calc(0.8rem + 0.35rem);
    }
    #generateRow .btn-primary {
      width: 100%;
      text-transform: uppercase;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      color: #111827;
      text-align: center;
    }

    .report-select-wrap {
      border: 2px solid #003484;
      border-radius: 8px;
      padding: 0.25rem 1.25rem 0.35rem;
      display: inline-block;
    }

    #reportSelect {
      font-size: 1.3rem;
      font-weight: normal;
      color: #9ca3af;
      text-align: left;
      border: none;
      background: transparent;
      cursor: pointer;
      outline: none;
      appearance: auto;
    }
    #reportSelect.has-value { color: #111827; }
    #reportSelect option { color: #111827; }
    #reportSelect option:disabled { color: #9ca3af; }

    #refDate {
      width: 100%;
      font-size: 0.8125rem;
      padding: 0.45rem 0.5rem;
    }

    .auth-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      color: #6b7280;
      margin-bottom: 1.25rem;
    }

    .auth-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #d1d5db;
      flex-shrink: 0;
    }
    .auth-dot.ok { background: #22c55e; }

    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: #374151;
      margin-bottom: 0.3rem;
    }

    select, input[type="text"], input[type="date"] {
      display: block;
      width: 100%;
      padding: 0.45rem 0.5rem;
      font-size: 0.8125rem;
      color: #111827;
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      transition: border-color 0.12s, box-shadow 0.12s;
    }
    select:disabled { background: #f3f4f6; color: #9ca3af; cursor: not-allowed; }
    select:focus, input[type="text"]:focus, input[type="date"]:focus {
      outline: none;
      border-color: #5a8ad4;
      box-shadow: 0 0 0 3px rgba(90,138,212,0.15);
    }
    input[type="text"]::placeholder { color: #c4c9d0; }

    /* ── Measure section ──────────────────────────────────── */
    #appForm { margin-top: 1rem; }
    .measure-section {
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 0.5rem 1rem 1rem;
      margin-bottom: 0.875rem;
    }

    .section-hdr {
      font-size: 0.75rem;
      font-weight: 700;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0 0.3rem;
    }

    .fields-row {
      display: grid;
      grid-template-columns: 1.3fr 1fr 0.75fr 0.75fr 0.75fr 1.1fr;
      gap: 0.6rem;
      align-items: end;
    }

    .field-error {
      display: none;
      margin: 0.35rem 0 0;
      font-size: 0.75rem;
      font-weight: 700;
      color: #dc2626;
      text-align: center;
    }

    /* ── Buttons ──────────────────────────────────────────── */
    .btn-primary {
      display: block;
      width: 100%;
      padding: 0.6rem 1rem;
      margin-top: 0.25rem;
      background: #004abc;
      color: #fff;
      font-size: 0.875rem;
      font-weight: 600;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .btn-primary:hover:not(:disabled) { background: #165ac2; }
    .btn-primary:disabled { background: #a3bee7; cursor: not-allowed; }

    /* ── Results ──────────────────────────────────────────── */
    .results-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .result-box {
      padding: 0.875rem 1rem;
      border-radius: 4px;
      font-size: 0.875rem;
    }
    .result-box.success { background: #f0fdf4; border: 1px solid #86efac; }
    .result-box.error   { background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; }

    .result-section-hdr {
      font-size: 0.7rem;
      font-weight: 700;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
    }
    .result-row + .result-row { margin-top: 0.45rem; }

    .result-lbl {
      font-size: 0.7rem;
      font-weight: 700;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .result-val {
      font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
      font-size: 0.9375rem;
      color: #111827;
      word-break: break-all;
    }

    .result-val-wrap {
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .copy-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      color: #9ca3af;
      flex-shrink: 0;
      line-height: 1;
      transition: color 0.12s;
    }
    .copy-btn:hover  { color: #5a8ad4; }
    .copy-btn.copied { color: #22c55e; }

    /* ── Ramp results ─────────────────────────────────────── */
    .ramp-results {
      margin-top: 1rem;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 0.875rem 1rem;
      box-shadow: 0 4px 16px rgba(0,0,0,0.13), 0 1px 4px rgba(0,0,0,0.09);
    }
    .ramp-results.error {
      background: #fef2f2;
      border-color: #fca5a5;
      color: #991b1b;
    }

    .ramp-results-hdr {
      font-size: 0.75rem;
      font-weight: 700;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.625rem;
    }

    .ramp-col-template {
      display: grid;
      grid-template-columns: 11ch 2ch 9ch 10ch 4ch 3ch 7ch 2ch 2ch 4ch 10ch 2ch 4fr;
      gap: 0.5rem;
      align-items: center;
    }

    .hsl-ramp-col-template {
      display: grid;
      grid-template-columns: minmax(0,0.4fr) minmax(0,0.55fr) minmax(0,0.7fr) minmax(0,0.3fr) 8ch minmax(0,0.4fr) minmax(0,0.175fr) minmax(0,0.3fr) minmax(0,1.1fr) minmax(0,4fr);
      gap: 0.5rem;
      align-items: center;
    }

    .unresolved-section {
      margin-top: 1.5rem;
      border-top: 2px solid #f59e0b;
      padding-top: 0.75rem;
    }
    .unresolved-heading {
      font-weight: 600;
      color: #b45309;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
    }
    .unresolved-list {
      list-style: disc;
      padding-left: 1.5rem;
      font-size: 0.8rem;
      color: #374151;
    }
    .unresolved-list li {
      margin-bottom: 0.25rem;
    }


    .ramp-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .ramp-list-header {
      padding: 0.25rem 0.6rem 0.35rem;
      border-bottom: 2px solid #e5e7eb;
      margin-bottom: 0.2rem;
      font-size: 0.8125rem;
      font-weight: 700;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      align-items: end;
    }
    .ramp-list-header > span {
      font-size: 0.7rem;
      text-align: center;
    }
    .ramp-list-header > span:last-child {
      text-align: left;
    }
    .ramp-item > span {
      text-align: center;
    }
    .ramp-item > span:last-child {
      text-align: left;
    }
    .ramp-item > span:nth-child(n+5) {
      padding-left: 3.5ch;
    }
    .ramp-item > span:nth-child(7) {
      padding-left: 5ch;
    }
    .ramp-item > span:nth-child(11) {
      padding-left: 5.5ch;
    }
    .ramp-item > span:nth-child(12) {
      padding-left: 4.5ch;
    }
    .ramp-list-header > span:nth-child(12) {
      padding-right: 4ch;
    }
    .ramp-item > span:last-child {
      padding-left: 4ch;
    }

    .ramp-item {
      padding: 0.35rem 0.6rem;
      font-size: 0.8125rem;
      color: #374151;
      border-radius: 3px;
    }
    .ramp-item:nth-child(odd) { background: #e9ebed; }

    .ramp-empty {
      font-size: 0.875rem;
      color: #9ca3af;
      font-style: italic;
    }

    .ramp-pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.4rem;
    }
    .page-arrow {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      color: #374151;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      line-height: 1;
    }
    .page-arrow:hover:not(:disabled) { background: #f3f4f6; }
    .page-arrow:disabled { color: #d1d5db; cursor: default; }
    .pagination-left,
    .pagination-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
    }
    .pagination-left { align-items: flex-start; }
    .pagination-right { align-items: flex-end; }
    .export-btn {
      font-size: 0.8rem;
      font-weight: 700;
      color: #004abc;
      background: #fff;
      border: 2px solid #004abc;
      border-radius: 6px;
      padding: 0.35rem 1rem;
      cursor: pointer;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .export-btn:hover { background: #004abc; color: #fff; }

    .ptc-btn {
      display: inline-flex;
      align-items: stretch;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #9ca3af;
      padding: 2px;
    }
    .ptc-btn:hover { background: linear-gradient(to right, #003484, #004abc); }
    .ptc-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .ptc-label {
      background: #fff;
      border-radius: 6px 0 0 6px;
      padding: 0.55rem 1.6rem;
      font-size: 0.8rem;
      font-weight: 700;
      color: #003484;
      letter-spacing: 0.1em;
      display: flex;
      align-items: center;
    }
    .ptc-arrow {
      border-radius: 0 6px 6px 0;
      padding: 0.55rem 1rem;
      color: #fff;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mode-selector {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem 0 1rem;
    }
    .mode-selector-box {
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 0.5rem 1.25rem 0.75rem;
      margin: 0;
      box-shadow: -3px 3px 6px rgba(0,0,0,0.06), 3px 3px 6px rgba(0,0,0,0.06), 0 4px 6px rgba(0,0,0,0.06);
    }
    .mode-selector-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .mode-btn {
      padding: 0.6rem 1.25rem;
      white-space: nowrap;
      width: 100%;
      background: #004abc;
      color: #fff;
      font-size: 0.875rem;
      font-weight: 600;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.12s;
      text-transform: uppercase;
    }
    .mode-btn:hover:not(:disabled) { background: #165ac2; }
    .mode-btn:disabled { background: #a3bee7; cursor: not-allowed; }
    .mode-btn.active { background: #003484; }
    .mode-selector-label {
      font-size: 0.8rem;
      font-weight: 500;
      color: #6b7280;
      white-space: nowrap;
      padding: 0 0.4rem;
    }
    .route-form-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 0 0.5rem;
    }
    .route-form-row label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #374151;
    }
    .route-form-row select {
      font-size: 0.85rem;
      padding: 0.3rem 0.5rem;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      min-width: 120px;
      width: auto;
    }
    #districtSelect,
    #districtCountySelect,
    #districtRouteSelect,
    #from-county,
    #to-county { color: #9ca3af; }
    #districtSelect.has-value,
    #districtCountySelect.has-value,
    #districtRouteSelect.has-value,
    #from-county.has-value,
    #to-county.has-value { color: #111827; }
    #districtSelect option,
    #districtCountySelect option,
    #districtRouteSelect option,
    #from-county option,
    #to-county option { color: #111827; }
    .report-title {
      text-align: center;
      line-height: 1.3;
    }
    .report-title-line1 {
      font-size: 1.6rem;
      font-weight: 600;
      color: #374151;
    }
    .report-title-line2 {
      font-size: 1.5rem;
      color: #6b7280;
    }
    .report-title-line3 {
      font-size: 1.2rem;
      color: #6b7280;
      margin-top: 1.5rem;
    }
    .page-info {
      font-size: 0.75rem;
      color: #6b7280;
      text-align: center;
      margin-top: 0.4rem;
    }

    #loginPrompt {
      text-align: center;
      color: #6b7280;
      font-size: 0.875rem;
      padding: 0.5rem 0;
    }

    .report-action-bar {
      display: flex;
      align-items: flex-start;
      padding: 0.4rem 0 0;
    }
    .report-action-bar .report-title {
      flex: 1;
      text-align: center;
    }

    .rs-summary-footer {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      padding: 0.75rem 0.25rem 0.25rem;
      font-size: 1.2rem;
      color: #111827;
    }
    .generated-on {
      font-size: 0.72rem;
      color: #9ca3af;
      text-align: right;
      padding: 0.75rem 0.25rem 0.25rem;
    }

    /* ── RS: Cover Page ──────────────────────────────────────────────────── */
    .rs-cover {
      border-bottom: 1px solid #d1d5db;
      padding: 1.5rem 0 1.5rem;
      margin-bottom: 0.5rem;
      font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
    }
    .rs-cover-agency {
      text-align: center;
      font-style: italic;
      font-size: 1.05rem;
      font-family: inherit;
      margin-bottom: 1.25rem;
    }
    .rs-cover-report-title {
      font-size: 1rem;
      font-weight: bold;
      margin-bottom: 1rem;
    }
    .rs-cover-section {
      margin-bottom: 0.75rem;
    }
    .rs-cover-section-label {
      font-weight: bold;
      font-size: 0.85rem;
      margin-bottom: 0.3rem;
    }
    .rs-cover-table {
      border-collapse: collapse;
      margin-left: 2rem;
      font-size: 0.82rem;
    }
    .rs-cover-table td { padding: 0.05rem 0.5rem 0.05rem 0; vertical-align: top; }
    .rs-cover-table .cp-name { min-width: 9rem; }
    .rs-cover-table .cp-sep  { padding-right: 0.75rem; }
    @media print {
      .rs-cover { page-break-after: always; border-bottom: none; }
    }
    @media screen {
      .rs-cover { display: none; }
    }

    /* ── HSL: Cover Page additions ───────────────────────────────────────── */
    .hsl-cover-agency {
      text-align: center;
      font-size: 1.4rem;
      font-family: serif;
      margin-bottom: 0.5rem;
    }
    .hsl-cover-report-title {
      text-align: center;
      font-size: 1.15rem;
      font-family: serif;
      margin-bottom: 1.5rem;
    }
    .hsl-cover-note {
      border: 1px solid #000;
      padding: 0.5rem 0.75rem;
      margin-bottom: 0.75rem;
      font-size: 0.82rem;
    }
    .hsl-cover-note-header {
      text-align: center;
      font-weight: bold;
      margin-bottom: 0.35rem;
    }
    .hsl-cover-note p { margin: 0; font-weight: bold; }
    .hsl-cover-policy {
      border: 1px solid #000;
      padding: 0.5rem 0.75rem;
      font-size: 0.82rem;
    }
    .hsl-cover-policy p { margin: 0 0 0.5rem; }
    .hsl-cover-policy p:last-child { margin-bottom: 0; }

    /* ── RS: Ramp Summary ────────────────────────────────────────────────── */
    .rs-report { padding: 1rem 0; }
    .rs-fieldsets { display: flex; flex-direction: row; gap: 1.25rem; align-items: flex-start; }
    .rs-fieldsets-col { display: inline-flex; flex-direction: column; gap: 1.25rem; }
    .rs-fieldsets-col .rs-fieldset { width: 100%; }
    .rs-fieldsets-right { display: flex; flex-direction: column; gap: 1.25rem; flex: 1; }
    .rs-fieldsets-right .rs-fieldset { width: 100%; }
    .rs-fieldset { box-shadow: none !important; }
    .rs-table { border-collapse: collapse; }
    .rs-table th, .rs-table td { padding: 0.1rem 1.5rem 0.1rem 0; text-align: left; font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace !important; font-size: 0.9375rem !important; }
    .rs-num { min-width: 5ch; text-align: right !important; padding-right: 1.5rem !important; }

    /* ── Confirm modal ──────────────────────────────────────────────────────── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal-box {
      background: #fff;
      border-radius: 10px;
      padding: 2rem 2.25rem 1.5rem;
      max-width: 360px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,52,132,0.18);
      text-align: center;
    }
    .modal-message {
      font-size: 0.95rem;
      font-weight: 600;
      color: #003484;
      margin-bottom: 1.5rem;
      line-height: 1.4;
    }
    .modal-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
    }
    .modal-yes {
      background: #fff;
      color: #004abc;
      border: 2px solid #004abc;
      border-radius: 6px;
      padding: 0.45rem 1.5rem;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .modal-yes:hover { background: #004abc; color: #fff; }
    .modal-no {
      background: #fff;
      color: #004abc;
      border: 2px solid #004abc;
      border-radius: 6px;
      padding: 0.45rem 1.5rem;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .modal-no:hover { background: #004abc; color: #fff; }

    /* ── HSL: Print table (thead repeats on each page) ──────────────────── */
    .hsl-print-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.78rem;
    }
    .hsl-print-table thead { display: table-header-group; }
    .hsl-print-table th {
      font-size: 0.7rem;
      text-align: center;
      font-weight: 700;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 2px solid #e5e7eb;
      padding: 0.25rem 0.3rem 0.35rem;
      vertical-align: bottom;
    }
    .hsl-print-table th:last-child { text-align: left; }
    .hsl-print-table td {
      padding: 0.1rem 0.3rem;

<script>
  // ── In-memory token state ──────────────────────────────────────────────────
  let _token         = null;
  let _tokenExpiry   = null;
  let _portalUsername = '';

  // ── Pagination state ───────────────────────────────────────────────────────
  const PAGE_SIZE  = 25;
  let _allResults    = [];
  let _unresolvedIntersections = [];
  let _currentPage   = 0;
  let _allRouteIds        = new Set(); // pre-fetched AllRoads RouteIDs from layer 116
  let _routeDirectionCache = new Map(); // routeNum → { from, to }
  let _hslLengths        = null;       // cached result of hsl_computeLengths for current dataset
  let _countyNameToCode  = new Map(); // county name → 3-letter County_Code for layer 151
  let _generatedOn   = '';

  function startThinking(btn) {
    if (btn._thinkingTimer) { clearInterval(btn._thinkingTimer); btn._thinkingTimer = null; }
    const phrases = [
      'Poking the database',
      'Crunching the numbers',
      'Asking the interwebs',
      'Doing math stuff',
      'Feeding the hamsters',
      'Chewing on that',
      'Phoning a friend',
      'Checking with Jaime'
    ];
    const phrase = phrases[Math.floor(Math.random() * phrases.length)];
    const frames = [
      phrase + '\u00A0\u00A0\u00A0',
      phrase + '.\u00A0\u00A0',
      phrase + '..\u00A0',
      phrase + '...'
    ];
    let i = 0;
    btn.textContent = frames[i];
    btn._thinkingTimer = setInterval(() => {
      i = (i + 1) % frames.length;
      btn.textContent = frames[i];
    }, 400);
  }

  function stopThinking(btn) {
    if (btn._thinkingTimer) { clearInterval(btn._thinkingTimer); btn._thinkingTimer = null; }
    btn.textContent = 'Generate';
  }
  let _routeLabel    = '';
  let _directionFrom = '';
  let _directionTo   = '';

  // ── County codes ──────────────────────────────────────────────────────────
  const COUNTY_CODES = [
    {value:'ALA',display:'ALA'}, {value:'ALP',display:'ALP'}, {value:'AMA',display:'AMA'},
    {value:'BUT',display:'BUT'}, {value:'CAL',display:'CAL'}, {value:'CC.',display:'CC' },
    {value:'COL',display:'COL'}, {value:'DN.',display:'DN' }, {value:'ED.',display:'ED' },
    {value:'FRE',display:'FRE'}, {value:'GLE',display:'GLE'}, {value:'HUM',display:'HUM'},
    {value:'IMP',display:'IMP'}, {value:'INY',display:'INY'}, {value:'KER',display:'KER'},
    {value:'KIN',display:'KIN'}, {value:'LA.',display:'LA' }, {value:'LAK',display:'LAK'},
    {value:'LAS',display:'LAS'}, {value:'MAD',display:'MAD'}, {value:'MEN',display:'MEN'},
    {value:'MER',display:'MER'}, {value:'MNO',display:'MNO'}, {value:'MOD',display:'MOD'},
    {value:'MON',display:'MON'}, {value:'MPA',display:'MPA'}, {value:'MRN',display:'MRN'},
    {value:'NAP',display:'NAP'}, {value:'NEV',display:'NEV'}, {value:'ORA',display:'ORA'},
    {value:'PLA',display:'PLA'}, {value:'PLU',display:'PLU'}, {value:'RIV',display:'RIV'},
    {value:'SAC',display:'SAC'}, {value:'SB.',display:'SB' }, {value:'SBD',display:'SBD'},
    {value:'SBT',display:'SBT'}, {value:'SCL',display:'SCL'}, {value:'SCR',display:'SCR'},
    {value:'SD.',display:'SD' }, {value:'SF.',display:'SF' }, {value:'SHA',display:'SHA'},
    {value:'SIE',display:'SIE'}, {value:'SIS',display:'SIS'}, {value:'SJ.',display:'SJ' },
    {value:'SLO',display:'SLO'}, {value:'SM.',display:'SM' }, {value:'SOL',display:'SOL'},
    {value:'SON',display:'SON'}, {value:'STA',display:'STA'}, {value:'SUT',display:'SUT'},
    {value:'TEH',display:'TEH'}, {value:'TRI',display:'TRI'}, {value:'TUL',display:'TUL'},
    {value:'TUO',display:'TUO'}, {value:'VEN',display:'VEN'}
  ];

  // ── OAuth (ArcGIS implicit flow) ──────────────────────────────────────────

  function login() {
    const params = new URLSearchParams({
      client_id:     CONFIG.oauthClientId,
      response_type: 'token',
      redirect_uri:  CONFIG.oauthRedirectUrl,
      expiration:    '120'
    });
    window.location.href = `${CONFIG.oauthAuthorizeUrl}?${params}`;
  }

  function tokenIsValid() {
    if (!_token) return false;
    if (_tokenExpiry && Date.now() >= _tokenExpiry) { _token = null; return false; }
    return true;
  }


async function loadCountyCodeDomain() {
    try {
      const resp = await fetch(`${CONFIG.featureServiceUrl}/151?f=json&token=${_token}`);
      const data = await resp.json();
      const field = (data.fields ?? []).find(f => f.name === 'County_Code');
      const coded = field?.domain?.codedValues ?? [];
      _countyNameToCode = new Map();
      for (const cv of coded) {
        _countyNameToCode.set(cv.name, cv.code); // full name  → code  (e.g. "Lake"  → "LAK")
        _countyNameToCode.set(cv.code, cv.code); // code → code  (e.g. "LAK"  → "LAK")
      }
    } catch (e) {
      console.warn('[loadCountyCodeDomain] error:', e.message);
    }
  }

  /*
   * Feature Service Layer Index Reference
   * ─────────────────────────────────────
   *  0   – Intersection geometry (point features)
   *  116 – AllRoads (route geometry / LRS)
   *  123 – Landmarks (EV_SHS_LANDMARK; County uses 3-char code e.g. 'LA.')
   *  132 – Ramps (EV_SHS_RAMP; County uses 3-char code)
   *  133 – Route Breaks (EV_SHS_ROUTE_BREAK; County uses 3-char code)
   *  149 – Intersection AOI (area-of-interest polygon)
   *  151 – Intersection Attributes (County_Code uses 3-char code e.g. 'LA.')
   *  305 – PM Equation Points (County uses 2-char code e.g. 'LA')
   */

  /**
   * Resolves a county name or code to the 3-char code used by layers 123, 132, 133, and 151
   * (e.g., "Los Angeles" → "LA.", "LA" → "LA.", "LA." → "LA.").
   * Returns null when county is falsy.
   * NOTE: Layer 305 (equation points) uses 2-char codes — do NOT use this helper there.
   */
  function normalizeCountyCode(county) {
    if (!county) return null;
    const code = _countyNameToCode.get(county) ?? county;
    return code.length === 2 ? code + '.' : code;
  }

  /**
   * Splits an array into chunks of at most `size` elements.
   * Used to stay within the feature service's max-record-count per request.
   */
  function chunkArray(arr, size) {
    const chunks = [];
    for (let i = 0; i < arr.length; i += size) {
      chunks.push(arr.slice(i, i + size));
    }
    return chunks;
  }

  /**
   * Builds a segment descriptor object from route/county/district and postmile range.
   */
  function makeSegment(fromPrimary, fromAlt, toPrimary, toAlt) {
    const fromEff = fromPrimary ?? fromAlt;
    const toEff   = toPrimary   ?? toAlt;
    if (!fromEff || !toEff) return null;
    const fromM = Math.min(fromEff.measure, fromAlt?.measure ?? fromEff.measure);
    const toM   = Math.max(toEff.measure,   toAlt?.measure   ?? toEff.measure);
    return { fromBest: { routeId: fromEff.routeId, measure: fromM },
             toBest:   { routeId: toEff.routeId,   measure: toM   } };
  }

  function setAuthUI(authenticated) {
    document.getElementById('loginPrompt').style.display  = authenticated ? 'none'  : 'block';
    document.getElementById('modeSelector').style.display = authenticated ? 'block' : 'none';
    document.getElementById('appForm').style.display      = 'none';
    document.getElementById('controlsGrid').style.display = 'none';
    if (authenticated) { loadVersions(); loadRouteList(); loadCountyCodeDomain(); }
  }

  function resetModeSelections() {
    document.getElementById('districtSelect').value = '';
    document.getElementById('districtSelect').classList.remove('has-value');
    const countySel = document.getElementById('districtCountySelect');
    countySel.innerHTML = '<option value="" disabled hidden selected>-- Select County --</option><option value="">-- ALL --</option>';
    countySel.classList.remove('has-value');
    countySel.disabled = true;
    const routeSel = document.getElementById('districtRouteSelect');
    routeSel.innerHTML = '<option value="" disabled hidden selected>-- Select Route --</option>';
    routeSel.classList.remove('has-value');
    routeSel.disabled = true;
    document.getElementById('districtRouteBtn').disabled = true;
  }

  function selectMode(mode) {
    resetModeSelections();
    const isHSL = document.getElementById('reportSelect').value === 'highway_sequence';
    document.getElementById('appForm').style.display              = mode === 'routeMeasure' ? 'block' : 'none';
    document.getElementById('controlsGrid').style.display         = 'grid';
    const showDR = mode === 'districtRoute';
    ['districtRow', 'districtCountyRow', 'districtRouteRow'].forEach(id => {
      document.getElementById(id).style.display = showDR ? 'flex' : 'none';
    });
    document.getElementById('districtRouteBtn').style.display     = showDR ? 'inline-block' : 'none';
    if (showDR) document.getElementById('districtRouteBtn').disabled = true;
    document.getElementById('generateRow').style.display          = showDR ? 'flex' : 'none';
    document.getElementById('onOffSection').style.display         = showDR && !isHSL ? 'flex' : 'none';
    if (isHSL) {
      document.getElementById('translateOnOffRow').style.display  = 'none';
    } else {
      document.getElementById('translateOnOffRow').style.display  = '';
    }
    document.getElementById('modeBtnRouteMeasure').classList.toggle('active', mode === 'routeMeasure');
    document.getElementById('modeBtnDistrictRoute').classList.toggle('active', mode === 'districtRoute');
    clearResults();
  }

  async function loadRouteList() {
    const params = new URLSearchParams({
      where:                '1=1',
      outFields:            'RouteID',
      returnDistinctValues: 'true',
      returnGeometry:       'false',
      ...versionParam(),
      f:                    'json',
      token:                _token
    });
    let data;
    try {
      const resp = await fetch(`${CONFIG.mapServiceUrl}/116/query?${params}`);
      data = await resp.json();
    } catch (e) {
      console.warn('[loadRouteList] fetch error:', e.message);
      return;
    }
    if (!Array.isArray(data.features)) {
      console.warn('[loadRouteList] unexpected response:', data);
      return;
    }

    for (const f of data.features) {
      const rid = f.attributes?.RouteID;
      if (rid) _allRouteIds.add(rid);
    }
  }

  async function onDistrictChange() {
    const districtSel = document.getElementById('districtSelect');
    const district    = districtSel.value;
    districtSel.classList.toggle('has-value', !districtSel.options[districtSel.selectedIndex]?.disabled);

    const countySel  = document.getElementById('districtCountySelect');
    const routeSel   = document.getElementById('districtRouteSelect');
    const btn        = document.getElementById('districtRouteBtn');

    // Reset county and route
    countySel.innerHTML = '<option value="" disabled hidden selected>-- Select County --</option><option value="">-- ALL --</option>';
    countySel.classList.remove('has-value');
    countySel.disabled = true;
    routeSel.innerHTML = '<option value="" disabled hidden selected>-- Select Route --</option>';
    routeSel.classList.remove('has-value');
    routeSel.disabled = true;
    btn.disabled = true;

    // If placeholder still selected, leave county/route disabled
    if (districtSel.options[districtSel.selectedIndex]?.disabled) return;

    countySel.innerHTML = '<option value="" disabled hidden selected>-- Loading counties\u2026 --</option>';

    const params = new URLSearchParams({
      where:                district ? `District_Code = ${parseInt(district, 10)}` : '1=1',
      outFields:            'County',
      returnDistinctValues: 'true',
      returnGeometry:       'false',
      orderByFields:        'County ASC',
      ...versionParam(),
      f:                    'json',
      token:                _token
    });
    let data;
    try {
      const resp = await fetch(`${CONFIG.featureServiceUrl}/215/query?${params}`);
      data = await resp.json();
    } catch (e) {
      console.warn('[onDistrictChange] fetch error:', e.message);
      countySel.innerHTML = '<option value="" disabled hidden selected>-- Error loading counties --</option>';
      return;
    }
    const counties = Array.isArray(data.features)
      ? data.features.map(f => f.attributes?.County).filter(v => v != null).sort()
      : [];
    countySel.innerHTML = '<option value="" disabled hidden selected>-- Select County --</option><option value="">-- ALL --</option>';
    for (const c of counties) {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      countySel.appendChild(opt);
    }
    countySel.disabled = false;
  }

  async function onCountyChange() {
    const district  = document.getElementById('districtSelect').value;
    const countySel = document.getElementById('districtCountySelect');
    const county    = countySel.value;
    const routeSel  = document.getElementById('districtRouteSelect');
    const btn       = document.getElementById('districtRouteBtn');

    countySel.classList.toggle('has-value', !countySel.options[countySel.selectedIndex]?.disabled);

    // Reset route
    routeSel.innerHTML = '<option value="" disabled hidden selected>-- Select Route --</option>';
    routeSel.classList.remove('has-value');
    routeSel.disabled = true;
    btn.disabled = true;

    // If county placeholder still selected, leave route disabled
    if (countySel.options[countySel.selectedIndex]?.disabled) return;

    const whereClause = district && county
      ? `District_Code = ${parseInt(district, 10)} AND County = '${county.replace(/'/g, "''")}'`
      : district
        ? `District_Code = ${parseInt(district, 10)}`
        : county
          ? `County = '${county.replace(/'/g, "''")}'`
          : '1=1';

    const params = new URLSearchParams({
      where:                whereClause,
      outFields:            'RouteNum,RouteSuffix',
      returnDistinctValues: 'true',
      returnGeometry:       'false',
      orderByFields:        'RouteNum ASC',
      ...versionParam(),
      f:                    'json',
      token:                _token
    });
    let data;
    try {
      const resp = await fetch(`${CONFIG.featureServiceUrl}/215/query?${params}`);
      data = await resp.json();
    } catch (e) {
      console.warn('[onCountyChange] fetch error:', e.message);
      routeSel.innerHTML = '<option value="" disabled hidden>-- Error loading routes --</option>';
      return;
    }
    if (!Array.isArray(data.features)) {
      routeSel.innerHTML = '<option value="" disabled hidden>-- No routes found --</option>';
      return;
    }

    const seen = new Set();
    const routes = [];
    for (const f of data.features) {
      const num = f.attributes?.RouteNum;
      if (num == null) continue;
      const sfx = f.attributes?.RouteSuffix;
      const hasSignificantSuffix = sfx && sfx !== '.';
      const padded = String(num).padStart(3, '0');
      const value  = hasSignificantSuffix ? padded + sfx : num;
      const label  = hasSignificantSuffix ? padded + sfx : padded;
      const key    = label;
      if (!seen.has(key)) { seen.add(key); routes.push({ value, label, num }); }
    }
    routes.sort((a, b) => a.num - b.num || String(a.label).localeCompare(String(b.label)));

    routeSel.innerHTML = '<option value="" disabled hidden selected>-- Select Route --</option>';
    for (const { value, label } of routes) {
      const opt = document.createElement('option');
      opt.value = value;
      opt.textContent = label;
      routeSel.appendChild(opt);
    }
    routeSel.disabled = false;
    routeSel.onchange = () => {
      routeSel.classList.toggle('has-value', !!routeSel.value);
      btn.disabled = !routeSel.value;
    };
  }

  async function runDistrictRouteMode() {
    if (document.getElementById('reportSelect').value === 'highway_sequence') { await hsl_runDistrictRouteMode(); return; }
    if (document.getElementById('reportSelect').value === 'Ramp_Summary')     { await rs_runDistrictRouteMode(); return; }
    if (!tokenIsValid()) { login(); return; }

    const district = document.getElementById('districtSelect').value || null; // null = ALL
    const routeNum = document.getElementById('districtRouteSelect').value;
    const county   = getDistrictCounty();
    if (!routeNum) { showRampResults('error', 'Please select a route.');    return; }

    const paddedRoute    = String(routeNum).padStart(3, '0');
    const isSupplemental = /[A-Z]$/.test(paddedRoute);
    const routeSuffix    = isSupplemental ? paddedRoute.slice(-1) : '.';
    const primaryId      = isSupplemental ? `SHS_${paddedRoute}_P`  : `SHS_${paddedRoute}._P`;
    const secondaryId    = isSupplemental ? `SHS_${paddedRoute}_S`  : `SHS_${paddedRoute}._S`;

    // Always include both alignments — layer 116 may not list all RouteIDs present in layer 132/123
    // Use -0.001 lower bound to capture records with ARMeasure slightly below 0 due to float precision
    const segments = [
      { fromBest: { routeId: primaryId,   measure: -0.001 }, toBest: { routeId: primaryId,   measure: 999.999 } },
      { fromBest: { routeId: secondaryId, measure: -0.001 }, toBest: { routeId: secondaryId, measure: 999.999 } }
    ];

    const btn = document.getElementById('districtRouteBtn');
    btn.disabled = true;
    startThinking(btn);
    clearResults();

    try {
      const [rampPairs, direction] = await Promise.all([
        queryAttributeSet(segments, district, county),
        queryRouteDirection(routeNum)
      ]);
      _routeLabel    = paddedRoute;
      _directionFrom = direction.from;
      _directionTo   = direction.to;
      const allPairs = sortWithIndependentAlignments(rampPairs);
      if (allPairs.length === 0) { showRampResults('none'); return; }
      await queryRampDescriptions(allPairs);
    } catch (err) {
      showRampResults('error', err.message || 'An error occurred.');
    } finally {
      btn.disabled = false;
      stopThinking(btn);
    }
  }

  async function loadVersions() {
    const vmsUrl = CONFIG.vmsUrl;
    const sel = document.getElementById('versionSelect');

    let resp, data;
    try {
      resp = await fetch(`${vmsUrl}/versionInfos`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body:    new URLSearchParams({ f: 'json', token: _token }).toString()
      });
      data = await resp.json();
    } catch (e) {
      console.error('[loadVersions] error:', e.message);
      return;
    }

    if (!Array.isArray(data.versions)) {
      console.warn('[loadVersions] unexpected response:', data);
      return;
    }

    // Sort: DEFAULT first, then alphabetically
    const sorted = [...data.versions].sort((a, b) => {
      const aDefault = a.versionName.toUpperCase() === 'SDE.DEFAULT';
      const bDefault = b.versionName.toUpperCase() === 'SDE.DEFAULT';
      if (aDefault) return -1;
      if (bDefault) return  1;
      return a.versionName.localeCompare(b.versionName);
    });

    sel.innerHTML = '';
    for (const v of sorted) {
      const opt = document.createElement('option');
      const isDefault = v.versionName.toUpperCase() === 'SDE.DEFAULT';
      opt.value       = isDefault ? '' : v.versionName;
      opt.textContent = isDefault ? 'Default' : v.versionName;
      sel.appendChild(opt);
    }
  }

    return document.getElementById('versionSelect').value;

          if (v.length > dotIdx + 4) v = v.slice(0, dotIdx + 4);

        el.value = v;

  // ── Helpers ───────────────────────────────────────────────────────────────

  function readSection(prefix) {
    return {
      county:      document.getElementById(`${prefix}-county`).value,
      routeNum:    document.getElementById(`${prefix}-routeNum`).value.trim(),
      routeSuffix: document.getElementById(`${prefix}-routeSuffix`).value,
      pmPrefix:    document.getElementById(`${prefix}-pmPrefix`).value,
      pmSuffix:    document.getElementById(`${prefix}-pmSuffix`).value,
      measureRaw:  document.getElementById(`${prefix}-measure`).value.trim(),
    };
  }

  function buildRouteId(s, alignment) {
    return s.county + s.routeNum.padStart(3, '0') + s.routeSuffix + s.pmPrefix + s.pmSuffix + alignment;
  }

  // Sort pairs by odMeasure, grouping independent alignment sections (PMSuffix R
  // or L) so all R records in a section appear before all L records.
  // Equation first-rows (isSecondEq=false, "EQUATES TO") are removed from the
  // sort to prevent them from breaking R/L groups, then re-inserted immediately
  // before their eq2 partner based on eqPairId.
  function sortWithIndependentAlignments(pairs) {
    const eq1ById = new Map();
    const main = pairs.filter(p => {
      if (p.type === 'equation' && !p.isSecondEq) { eq1ById.set(p.eqPairId, p); return false; }
      return true;
    });

    main.sort((a, b) => {
      const diff = parseFloat(a.odMeasure) - parseFloat(b.odMeasure);
      if (Math.abs(diff) > 0.001) return diff;
      // At the same OD position, place equation points (pmSuffix='E') after
      // all other records so physical landmarks appear before the back-equation.
      if (a.pmSuffix === 'E' && b.pmSuffix !== 'E') return 1;
      if (a.pmSuffix !== 'E' && b.pmSuffix === 'E') return -1;
      return 0;
    });
    const grouped = [];
    let i = 0;
    while (i < main.length) {
      if (main[i].pmSuffix === 'R' || main[i].pmSuffix === 'L') {
        const j = i;
        // Continue through R, L, E, and any dot-record whose hgValue is 'R'
        // or 'L'. pmPrefix is unreliable — some END INDEP ALIGN landmarks
        // carry pmPrefix='.' rather than 'R', so we use hgValue exclusively.
        while (i < main.length) {
          const cur = main[i];
          if (cur.pmSuffix === 'R' || cur.pmSuffix === 'L') {
            i++;
          } else if (cur.pmSuffix === 'E') {
            i++;
          } else if (cur.hgValue === 'R' || cur.hgValue === 'L') {
            i++;
          } else {
            break;
          }
        }
        const section = main.slice(j, i);
        // R group: pmSuffix='R' ramps OR dot-records in HG 'R'
        grouped.push(...section.filter(p => p.pmSuffix === 'R' || (p.pmSuffix !== 'L' && p.pmSuffix !== 'E' && p.hgValue === 'R')));
        // L group: pmSuffix='L' ramps OR dot-records in HG 'L'
        grouped.push(...section.filter(p => p.pmSuffix === 'L' || (p.pmSuffix !== 'R' && p.pmSuffix !== 'E' && p.hgValue === 'L')));
        grouped.push(...section.filter(p => p.pmSuffix === 'E'));
      } else {
        grouped.push(main[i++]);
      }
    }

    // Re-insert each eq1 immediately before its eq2 partner.
    const result = [];
    for (const p of grouped) {
      if (p.type === 'equation' && p.isSecondEq) {
        const eq1 = eq1ById.get(p.eqPairId);
        if (eq1) result.push(eq1);
      }
      result.push(p);
    }
    return result;
  }

  function pickBest(locs) {
    const valid = locs.filter(l =>
      l.routeId != null &&
      l.measure != null &&
      (!l.status || l.status === 'esriLocatingOK' || l.status === 'esriLocatingMultipleLocation')
    );
    if (valid.length === 0) return null;
    return valid.reduce((a, b) => b.measure > a.measure ? b : a);
  }

  // ── Shared: Query method dispatch ────────────────────────────────────────
  // runDistrictRouteMode / runTranslate each check the active report and
  // delegate to the appropriate per-report implementation below.
  // To add a new report: add a dispatch branch here and a matching section.

  function checkTranslateReady() {
    ['from-county', 'to-county'].forEach(id => {
      document.getElementById(id).classList.toggle('has-value', !!document.getElementById(id).value);
    });
    const ready =
      document.getElementById('from-county').value   &&
      document.getElementById('from-routeNum').value.trim() &&
      document.getElementById('from-measure').value.trim()  &&
      document.getElementById('to-county').value     &&
      document.getElementById('to-routeNum').value.trim()   &&
      document.getElementById('to-measure').value.trim();
    document.getElementById('translateBtn').disabled = !ready;
  }

  function setFieldError(prefix, msg) {
    const el = document.getElementById(`${prefix}-translate-error`);
    if (!el) return;
    el.textContent    = msg;
    el.style.display  = msg ? 'block' : 'none';
  }

  // Translate one section (From or To) — returns { bestR, bestL } or throws
  async function translateSection(routeIdR, routeIdL, measure) {
    const body = new URLSearchParams({
      locations:             JSON.stringify([
        { routeId: routeIdR, measure },
        { routeId: routeIdL, measure }
      ]),
      targetNetworkLayerIds: JSON.stringify([4]),
      ...versionParam(),
      f:     'json',
      token: _token
    });
    const resp = await fetch(`${CONFIG.mapServiceUrl}/exts/LRServer/networkLayers/3/translate`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body:    body.toString()
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
    const data = await resp.json();
    if (data.error) {
      const code = data.error.code;
      if (code === 498 || code === 499) { _token = null; login(); throw new Error('auth'); }
      throw new Error(`API error ${code}: ${data.error.message}`);
    }
    const locs = data.locations ?? [];
    return {
      bestR: pickBest(locs[0]?.translatedLocations ?? []),
      bestL: pickBest(locs[1]?.translatedLocations ?? [])
    };
  }

  async function runTranslate() {
    if (document.getElementById('reportSelect').value === 'highway_sequence') { await hsl_runTranslate(); return; }
    if (document.getElementById('reportSelect').value === 'Ramp_Summary')     { await rs_runTranslate(); return; }
    if (!tokenIsValid()) { login(); return; }

    const from = readSection('from');
    const to   = readSection('to');

    const fromMeasure = parseFloat(from.measureRaw);
    if (isNaN(fromMeasure)) { showRampResults('error', 'From measure must be a number.'); return; }
    const toMeasure = parseFloat(to.measureRaw);
    if (isNaN(toMeasure)) { showRampResults('error', 'To measure must be a number.'); return; }

    // Clear any previous per-field errors
    setFieldError('from', '');
    setFieldError('to',   '');

    const fromRouteIdR = buildRouteId(from, 'R');
    const fromRouteIdL = buildRouteId(from, 'L');
    const toRouteIdR   = buildRouteId(to,   'R');
    const toRouteIdL   = buildRouteId(to,   'L');

    // Also translate L-pmSuffix variants to capture features calibrated on the L postmile route
    const needsLAlt  = from.pmSuffix !== 'L';
    const fromL      = { ...from, pmSuffix: 'L' };
    const toL        = { ...to,   pmSuffix: 'L' };

    const btn = document.getElementById('translateBtn');
    btn.disabled = true;
    startThinking(btn);
    clearResults();

    try {
      // Translate primary and L-pmSuffix variants all in parallel
      const [fromResult, toResult, fromAltResult, toAltResult] = await Promise.allSettled([
        translateSection(fromRouteIdR, fromRouteIdL, fromMeasure),
        translateSection(toRouteIdR,   toRouteIdL,   toMeasure),
        needsLAlt ? translateSection(buildRouteId(fromL, 'R'), buildRouteId(fromL, 'L'), fromMeasure) : Promise.resolve(null),
        needsLAlt ? translateSection(buildRouteId(toL,   'R'), buildRouteId(toL,   'L'), toMeasure)   : Promise.resolve(null)
      ]);

      // Error display only on primary results
      let hasError = false;

      if (fromResult.status === 'rejected') {
        if (fromResult.reason?.message !== 'auth') setFieldError('from', 'INVALID LOCATION');
        hasError = true;
      } else if (!fromResult.value.bestR && !fromResult.value.bestL) {
        setFieldError('from', 'INVALID LOCATION');
        hasError = true;
      }

      if (toResult.status === 'rejected') {
        if (toResult.reason?.message !== 'auth') setFieldError('to', 'INVALID LOCATION');
        hasError = true;
      } else if (!toResult.value.bestR && !toResult.value.bestL) {
        setFieldError('to', 'INVALID LOCATION');
        hasError = true;
      }

      if (hasError) return;

      const { bestR: fromBestR, bestL: fromBestL } = fromResult.value;
      const { bestR: toBestR,   bestL: toBestL   } = toResult.value;

      // Pull alt (L-pmSuffix) results if available — used to widen the ARMeasure range
      const fromAltV = fromAltResult.status === 'fulfilled' ? fromAltResult.value : null;
      const toAltV   = toAltResult.status   === 'fulfilled' ? toAltResult.value   : null;

      // Build a segment using the most inclusive From/To measures across both pmSuffix variants.
      // Alt substitutes for primary when primary is null (e.g. only L-pmSuffix translates on that alignment).
      const segments = [
        makeSegment(fromBestR, fromAltV?.bestR, toBestR, toAltV?.bestR),
        makeSegment(fromBestL, fromAltV?.bestL, toBestL, toAltV?.bestL)
      ].filter(Boolean);

      if (segments.length === 0) {
        showRampResults('error', 'Translation failed for both R and L alignments.');
        return;
      }

      const [rampPairs, direction] = await Promise.all([
        queryAttributeSet(segments),
        queryRouteDirection(from.routeNum.padStart(3, '0'))
      ]);
      _routeLabel    = from.routeNum.padStart(3, '0');
      _directionFrom = direction.from;
      _directionTo   = direction.to;

      const allPairs = sortWithIndependentAlignments(rampPairs);

      if (allPairs.length === 0) {
        showRampResults('none');
        return;
      }

      await queryRampDescriptions(allPairs);

    } finally {
      btn.disabled = false;
      stopThinking(btn);
    }
  }

  // ── Shared: State management & route direction ───────────────────────────

  function clearResults() {
    const rampBox = document.getElementById('rampResults');
    rampBox.style.display = 'none';
    rampBox.className = 'ramp-results';
    rampBox.innerHTML = '';
    _allResults              = [];
    _unresolvedIntersections = [];
    _currentPage   = 0;
    _routeLabel    = '';
    _directionFrom = '';
    _directionTo   = '';
    _hslLengths    = null;
  }

  async function queryRouteDirection(routeNum) {
    const cacheKey = `${routeNum}:${getVersion()}`;
    if (_routeDirectionCache.has(cacheKey)) return _routeDirectionCache.get(cacheKey);

    const routeInt = parseInt(routeNum, 10);
    if (isNaN(routeInt)) return { from: '', to: '' };
    const params = new URLSearchParams({
      where:          `ROUTE = ${routeInt}`,
      outFields:      'FROM_,TO_',
      returnGeometry: 'false',
      ...versionParam(),
      f:              'json',
      token:          _token
    });
    try {
      const resp = await fetch(`${CONFIG.mapServiceUrl}/304/query?${params}`);
      const data = await resp.json();
      if (data.features?.length > 0) {
        const a = data.features[0].attributes;
        const result = { from: a.FROM_ ?? '', to: a.TO_ ?? '' };
        if (_routeDirectionCache.size >= 100) _routeDirectionCache.clear();
        _routeDirectionCache.set(cacheKey, result);
        return result;
      }
    } catch (e) {
      console.error('[queryRouteDirection] error:', e.message);
    }
    return { from: '', to: '' };
  }

  // ── Shared: Core query functions ─────────────────────────────────────────
  // queryAttributeSet, queryRangeLayer, and translateToOD are used by both
  // the TSAR: Ramp Detail and HSL report pipelines.

  /** Queries ramp point events from layers 132, 123 (via shared pipeline), and 151 for the given measure segments. */
  async function queryAttributeSet(segments, district = null, county = null) {
    // Build one OR clause per segment (each segment is one alignment: R or L)
    // Small epsilon on both bounds absorbs floating-point drift from translate API
    const segClauses = segments.map(({ fromBest, toBest }) => {
      const fromM = Math.min(fromBest.measure, toBest.measure) - 0.005;
      const toM   = Math.max(fromBest.measure, toBest.measure) + 0.005;
      return `(RouteID = '${fromBest.routeId}' AND ARMeasure >= ${fromM} AND ARMeasure <= ${toM})`;
    });

    const dateFilter     = getDateFilter();
    const districtFilter = district != null ? ` AND District = ${parseInt(district, 10)}` : '';
    const resolvedCounty = normalizeCountyCode(county);
    const countyFilter   = resolvedCounty != null ? ` AND County = '${resolvedCounty.replace(/'/g, "''")}'` : '';
    const where = segClauses.length === 1
      ? segClauses[0].slice(1, -1) + districtFilter + countyFilter + ' AND LRSToDate IS NULL' + dateFilter
      : `(${segClauses.join(' OR ')})${districtFilter}${countyFilter} AND LRSToDate IS NULL${dateFilter}`;


    // Layer 132 is a point event layer — use standard feature layer query
    const body = new URLSearchParams({
      where,
      outFields:      'Ramp_Name,RouteID,ARMeasure,ODMeasure,County,RouteSuffix,PMPrefix,PMSuffix,PMMeasure,District,InventoryItemStartDate,InventoryItemEndDate',
      orderByFields:  'ARMeasure ASC',
      returnGeometry: 'true',
      ...versionParam(),
      f:              'json',
      token:          _token
    });


    let resp;
    try {
      resp = await fetch(`${CONFIG.mapServiceUrl}/132/query`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body:    body.toString()
      });
    } catch (e) {
      console.error('[queryRamps] network error:', e.message);
      return [];
    }

    if (!resp.ok) {
      console.error('[queryRamps] HTTP', resp.status, resp.statusText);
      return [];
    }

    let data;
    try {
      data = await resp.json();
    } catch (e) {
      console.error('[queryRamps] invalid JSON');
      return [];
    }


    if (data.error) {
      const code = data.error.code;
      if (code === 498 || code === 499) { _token = null; login(); return []; }
      console.error(`[queryRamps] API error ${code}: ${data.error.message}`);
      return [];
    }

    const features = data.features;
    if (!Array.isArray(features)) return [];
    if (data.exceededTransferLimit) console.warn('[queryRamps] exceededTransferLimit — results truncated. Narrow the measure range.');

    // Build unique pairs keyed by Ramp_Name (keep first occurrence per name)
    const seenNames = new Set();
    const pairs = [];
    for (const f of features) {
      const a = f.attributes ?? {};
      const name = a.Ramp_Name;
      if (name != null && name !== '' && !seenNames.has(name)) {
        seenNames.add(name);
        pairs.push({
          type:        'ramp',
          name,
          routeId:     a.RouteID,
          arMeasure:   a.ARMeasure,
          odMeasure:   a.ODMeasure != null ? String(a.ODMeasure) : '',
          county:      a.County      ?? '',
          routeSuffix: a.RouteSuffix ?? '',
          pmPrefix:    a.PMPrefix    ?? '',
          pmSuffix:    a.PMSuffix    ?? '.',
          pmMeasure:   a.PMMeasure   ?? '',
          district:    a.District != null ? String(a.District).padStart(2, '0') : '',
          startDate:   a.InventoryItemStartDate ?? null,
          endDate:     a.InventoryItemEndDate   ?? null,
          x:           f.geometry?.x ?? null,
          y:           f.geometry?.y ?? null
        });
      }
    }
    return pairs;
  }

  // ── TSAR: Ramp Detail — Query & result pipeline ──────────────────────────

  async function queryRampDescriptions(allPairs) {
    const fetchDescriptions = async () => {
      const descMap   = new Map();
      const area4Map  = new Map();
      const onOffMap      = new Map();
      const rampDesignMap = new Map();
      if (allPairs.length === 0) return { descMap, area4Map, onOffMap, rampDesignMap };
      const CHUNK = 100;
      const chunks = chunkArray(allPairs, CHUNK);
      const allDescFeatures = (await Promise.all(chunks.map(async chunk => {
        const inList = chunk.map(p => `'${p.name.replace(/'/g, "''")}'`).join(', ');
        const body = new URLSearchParams({
          where:          `Ramp_Name IN (${inList})${getDateFilter()}`,
          outFields:      'Ramp_Name,Ramp_Description,Area4_Ind,Ramp_On_Off_Ind,Ramp_Design',
          returnGeometry: 'false',
          ...versionParam(),
          f:              'json',
          token:          _token
        });
        try {
          const resp = await fetch(`${CONFIG.mapServiceUrl}/131/query`, {
            method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: body.toString()
          });
          const data = await resp.json();
          if (data.error) {
            const code = data.error.code;
            if (code === 498 || code === 499) { _token = null; login(); return []; }
            console.error(`[queryRampDesc] API error ${code}: ${data.error.message}`);
            return [];
          }
          return Array.isArray(data.features) ? data.features : [];
        } catch (e) {
          console.error('[queryRampDesc] error:', e.message);
          return [];
        }
      }))).flat();
      for (const f of allDescFeatures) {
        const n = f.attributes?.Ramp_Name;
        if (n == null) continue;
        if (!descMap.has(n))   descMap.set(n,   f.attributes?.Ramp_Description ?? '');
        if (!area4Map.has(n))  area4Map.set(n,  f.attributes?.Area4_Ind        ?? null);
        if (!onOffMap.has(n))      onOffMap.set(n,      f.attributes?.Ramp_On_Off_Ind ?? null);
        if (!rampDesignMap.has(n)) rampDesignMap.set(n, f.attributes?.Ramp_Design     ?? '');
      }
      return { descMap, area4Map, onOffMap, rampDesignMap };
    };

    const [{ descMap, area4Map, onOffMap, rampDesignMap }, hwyMap, cityMap, popMap, odMap, { aadtYearMap, aadtMap }] = await Promise.all([
      fetchDescriptions(),
      queryRangeLayer(allPairs, 116, 'Highway_Group'),
      queryRangeLayer(allPairs, 74,  'City_Code'),
      queryRangeLayer(allPairs, 130, 'Population_Code'),
      translateToOD(allPairs),
      queryAadt(allPairs)
    ]);

    const results = allPairs.map((p) => {
      return ({
      name:        p.name,
      featureType: 'R',
      desc:        descMap.get(p.name)  ?? '',
      hwyGroup:    hwyMap.get(p.name)   ?? '',
      area4:       area4Map.get(p.name) ?? null,
      cityCode:    cityMap.get(p.name)  ?? '',
      popCode:     popMap.get(p.name)   ?? '',
      onOff:       onOffMap.get(p.name)       ?? null,
      rampDesign:  rampDesignMap.get(p.name) ?? '',
      aadtYear:    aadtYearMap.get(p.name) ?? '',
      aadt:        aadtMap.get(p.name)     ?? null,
      county:      p.county,
      district:    p.district ?? '',
      routeSuffix: p.routeSuffix,
      pmPrefix:    p.pmPrefix ?? '',
      pmSuffix:    p.pmSuffix ?? '.',
      pmMeasure:   p.pmMeasure,
      odMeasure:   odMap.get(p.name)   ?? '',
      startDate:   p.startDate,
      endDate:     p.endDate
      });
    });

    const onOffFilter = getOnOffFilter();
    const filtered = onOffFilter === null ? results : results.filter(r => r.onOff === onOffFilter);
    showRampResults('success', null, filtered);
  }

  // Returns a Map of name → OD measure.
  // OD measures are pre-populated on pairs that carry them (landmarks, equation points).
  // Types without an OD measure (ramps, intersections) will have an empty string.
  function translateToOD(allPairs) {
    return new Map(allPairs.map(p => [p.name, p.odMeasure ?? '']));
  }

  // Returns a Map of name → fieldName value for range-based event layers (e.g. 116, 74)
  // _S records fall back to _P routeId — layers 116/74 only carry _P alignments
  async function queryRangeLayer(pairs, layerNum, fieldName) {
    const CHUNK = 100;
    const chunks = chunkArray(pairs, CHUNK);

    const allFeatures = (await Promise.all(chunks.map(async chunk => {
      const orClauses = chunk.map(p => {
        const rid = p.routeId.endsWith('_S') ? p.routeId.slice(0, -2) + '_P' : p.routeId;
        // Prefer odMeasure for the range lookup — it reflects the OD position on
        // the main alignment and avoids the _S→_P translation mismatch that can
        // place a feature inside the wrong highway-group / city-code segment.
        const m = (p.odMeasure !== '' && p.odMeasure != null) ? parseFloat(p.odMeasure) : p.arMeasure;
        return `(RouteID = '${rid}' AND FromARMeasure <= ${m} AND ToARMeasure >= ${m})`;
      }).join(' OR ');
      const body = new URLSearchParams({
        where:          `(${orClauses})${getDateFilter()}`,
        outFields:      `RouteID,FromARMeasure,ToARMeasure,${fieldName}`,
        returnGeometry: 'false',
        ...versionParam(),
        f:              'json',
        token:          _token
      });
      try {
        const resp = await fetch(`${CONFIG.mapServiceUrl}/${layerNum}/query`, {
          method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: body.toString()
        });
        const data = await resp.json();
        if (data.error) {
          const code = data.error.code;
          if (code === 498 || code === 499) { _token = null; login(); }
          console.error(`[queryRangeLayer/${layerNum}] API error ${code}: ${data.error.message}`);
          return [];
        }
        return Array.isArray(data.features) ? data.features : [];
      } catch (e) {
        console.error(`[queryRangeLayer/${layerNum}] error:`, e.message);
        return [];
      }
    }))).flat();

    const byRoute = new Map();
    for (const f of allFeatures) {
      const rid = f.attributes?.RouteID;
      if (rid == null) continue;
      if (!byRoute.has(rid)) byRoute.set(rid, []);
      byRoute.get(rid).push(f);
    }
    const map = new Map();
    for (const p of pairs) {
      const lookupId   = p.routeId.endsWith('_S') ? p.routeId.slice(0, -2) + '_P' : p.routeId;
      const m = (p.odMeasure !== '' && p.odMeasure != null) ? parseFloat(p.odMeasure) : p.arMeasure;
      const candidates = byRoute.get(lookupId) ?? [];
      const matches = candidates.filter(f => {
        const from = f.attributes?.FromARMeasure;
        const to   = f.attributes?.ToARMeasure;
        return from != null && to != null && m >= from && m <= to;
      });
      // When multiple ranges share the same boundary point, prefer the one whose
      // FromARMeasure is highest — i.e. the range that *starts* at the boundary
      // rather than the range that merely *ends* there.
      const match = matches.length > 1
        ? matches.reduce((best, f) => f.attributes.FromARMeasure > best.attributes.FromARMeasure ? f : best)
        : matches[0];
      map.set(p.name, match?.attributes?.[fieldName] ?? '');
    }
    return map;
  }

  // Returns { aadtYearMap, aadtMap } from layer 157 for the given pairs
  async function queryAadt(pairs) {
    const aadtYearMap = new Map();
    const aadtMap     = new Map();
    if (pairs.length === 0) return { aadtYearMap, aadtMap };

    // Query layer 157 spatially using bounding envelope of each chunk's ramp geometries
    const CHUNK = 50;
    const chunks = chunkArray(pairs, CHUNK);

    const allFeatures = (await Promise.all(chunks.map(async chunk => {
      const withGeo = chunk.filter(p => p.x != null && p.y != null);
      if (withGeo.length === 0) return [];
      const xMin = Math.min(...withGeo.map(p => p.x));
      const xMax = Math.max(...withGeo.map(p => p.x));
      const yMin = Math.min(...withGeo.map(p => p.y));
      const yMax = Math.max(...withGeo.map(p => p.y));
      const envelope = JSON.stringify({ xmin: xMin, ymin: yMin, xmax: xMax, ymax: yMax, spatialReference: { wkid: 3310 } });
      const body = new URLSearchParams({
        where:          '1=1',
        geometry:       envelope,
        geometryType:   'esriGeometryEnvelope',
        spatialRel:     'esriSpatialRelIntersects',
        outFields:      'OBJECTID,LRSFromDate,AADT_YEAR,AADT',
        returnGeometry: 'true',
        ...versionParam(),
        f:              'json',
        token:          _token
      });
      try {
        const resp = await fetch(`${CONFIG.mapServiceUrl}/157/query`, {
          method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: body.toString()
        });
        const data = await resp.json();
        if (data.error) {
          const code = data.error.code;
          if (code === 498 || code === 499) { _token = null; login(); }
          console.error(`[queryAadt] API error ${code}: ${data.error.message}`);
          return [];
        }
        return Array.isArray(data.features) ? data.features : [];
      } catch (e) {
        console.error('[queryAadt] error:', e.message);
        return [];
      }
    }))).flat();

    // For each ramp, find the layer 157 feature at the same x,y location,
    // picking the most recent LRSFromDate when multiple records share that point
    for (const p of pairs) {
      if (p.x == null || p.y == null) continue;
      const candidates = allFeatures.filter(f => {
        const fx = f.geometry?.x;
        const fy = f.geometry?.y;
        return fx != null && fy != null &&
               Math.abs(fx - p.x) < 0.01 && Math.abs(fy - p.y) < 0.01;
      });
      const match = candidates.reduce((best, f) => {
        if (!best) return f;
        return (f.attributes?.LRSFromDate ?? 0) > (best.attributes?.LRSFromDate ?? 0) ? f : best;
      }, null);
      aadtYearMap.set(p.name, match?.attributes?.AADT_YEAR ?? '');
      aadtMap.set(p.name,     match?.attributes?.AADT      ?? null);
    }
    return { aadtYearMap, aadtMap };
  }

    const box = document.getElementById('rampResults');

    if (type === 'error') {
      box.className = 'ramp-results error';
      box.innerHTML = esc(message);
    } else if (type === 'none') {
      box.className = 'ramp-results';
      box.innerHTML = `<span class="ramp-empty">No ramps found in this segment.</span>`;
    } else {
      _allResults    = names;
      _currentPage   = 0;

  // ── Shared: Pagination ───────────────────────────────────────────────────
  // changePage* calls renderPage(), which dispatches to the active report's
  // render function, so pagination works the same for all reports.

  function changePage(delta) {
    const totalPages = Math.ceil(_allResults.length / PAGE_SIZE);
    const next = _currentPage + delta;
    if (next < 0 || next >= totalPages) return;
    _currentPage = next;
    renderPage();
  }

  function changePageFirst() {
    if (_currentPage === 0) return;
    _currentPage = 0;
    renderPage();
  }

  function changePageLast() {
    const last = Math.ceil(_allResults.length / PAGE_SIZE) - 1;
    if (_currentPage === last) return;
    _currentPage = last;
    renderPage();
  }

  // ── Shared: Utilities & date filters ─────────────────────────────────────

  // Returns a Promise that resolves true (Yes) or false (No).
  function showConfirm(message) {
    return new Promise(resolve => {
      document.getElementById('confirmModalMessage').textContent = message;
      const backdrop = document.getElementById('confirmModal');
      backdrop.classList.add('open');
      const yes = document.getElementById('confirmModalYes');
      const no  = document.getElementById('confirmModalNo');
      function done(result) {
        backdrop.classList.remove('open');
        yes.removeEventListener('click', onYes);
        no.removeEventListener('click',  onNo);
        resolve(result);
      }
      function onYes() { done(true);  }
      function onNo()  { done(false); }
      yes.addEventListener('click', onYes);
      no.addEventListener('click',  onNo);
    });
  }

  // Formats a numeric measure as NNN.NNN (3 digits each side of decimal)
  function formatDate(ts) {
    const d = new Date(ts);
    return `${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}/${d.getFullYear()}`;
  }

  function padMeasure(val) {
    if (val === '' || val == null) return '';
    const num = parseFloat(val);
    if (isNaN(num)) return '';
    const [intPart, decPart] = num.toFixed(3).split('.');
    return intPart.padStart(3, '0') + '.' + decPart;
  }

  function esc(str) {
    return str
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function getDistrictCounty() {
    const val = document.getElementById('districtCountySelect')?.value;
    return val || null; // null means ALL → no filter
  }

  function getOnOffFilter() {
    let val;
    const onOffSection = document.getElementById('onOffSection');
    if (onOffSection?.style.display !== 'none')
      val = document.getElementById('onOffFilter')?.value;
    else
      val = document.getElementById('translateOnOffFilter')?.value;
    return val === '' || val == null ? null : Number(val);
  }

  function getDateFilter(startField = 'InventoryItemStartDate', endField = 'InventoryItemEndDate') {
    const val = document.getElementById('refDate').value; // "YYYY-MM-DD"
    if (!val || !/^\d{4}-\d{2}-\d{2}$/.test(val)) return '';
    const ts = `TIMESTAMP '${val} 00:00:00'`;
    return ` AND ${startField} <= ${ts}` +
           ` AND (${endField} IS NULL OR ${endField} > ${ts})`;
  }

  // Builds a print cover page HTML string.

  // refDate     : ISO date string (YYYY-MM-DD) or null

  function buildCoverPage({ coverTitle, reportTitle, refDate, district, county, route }) {
    const fmtDate = (iso) => {
      if (!iso) return '';
      const [y, m, d] = iso.split('-');
      return `${m}/${d}/${y}`;
    };
    const todayMDY = () => {
      const n = new Date();
      return `${String(n.getMonth()+1).padStart(2,'0')}/${String(n.getDate()).padStart(2,'0')}/${n.getFullYear()}`;
    };
    const cpRow = (name, val) =>
      `<tr><td class="cp-name">${esc(name)}</td><td class="cp-sep">:</td><td>${esc(val)}</td></tr>`;

      route    ? `<tr><td class="cp-name">ROUTE</td><td class="cp-sep"></td><td>${esc(route)}</td></tr>`     : '',
    ].filter(Boolean).join('') || `<tr><td colspan="3">All Districts / All Counties / All Routes</td></tr>`;

    return `<div class="rs-cover">
       <div class="rs-cover-agency">California Department of Transportation</div>

         <table class="rs-cover-table">
           ${cpRow('REPORT DATE',    todayMDY())}
           ${cpRow('REFERENCE DATE', fmtDate(refDate))}
           ${cpRow('SUBMITTOR',      _portalUsername)}
           ${cpRow('REPORT TITLE',   reportTitle)}
         </table>
       </div>
       <div class="rs-cover-section">
